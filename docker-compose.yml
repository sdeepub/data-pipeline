version: "3.8"

# ─── Shared environment for all services ────────────────────────────────────
x-kafka-env: &kafka-env
  KAFKA_BOOTSTRAP_SERVERS: kafka:29092
  KAFKA_TOPIC: sensor-topic
  KAFKA_DEAD_LETTER_TOPIC: sensor-topic-dlq

x-iotdb-env: &iotdb-env
  IOTDB_HOST: iotdb
  IOTDB_PORT: "6667"
  IOTDB_USER: root
  IOTDB_PASSWORD: root
  IOTDB_STORAGE_GROUP: root.factory1

# ─── Services ────────────────────────────────────────────────────────────────
services:

  # ── Zookeeper ───────────────────────────────────────────────────────────────
  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: zookeeper
    restart: unless-stopped
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "2181:2181"
    volumes:
      - zookeeper-data:/var/lib/zookeeper/data
      - zookeeper-logs:/var/lib/zookeeper/log

  # ── Kafka ────────────────────────────────────────────────────────────────────
  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: kafka
    restart: unless-stopped
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"    # external (host → kafka)
      - "29092:29092"  # internal (container → container)
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      # Retain messages for 24 hours (enough for debugging)
      KAFKA_LOG_RETENTION_HOURS: 24
      KAFKA_LOG_RETENTION_BYTES: 1073741824   # 1 GB cap
    volumes:
      - kafka-data:/var/lib/kafka/data
    healthcheck:
      test: kafka-topics --bootstrap-server localhost:29092 --list
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 30s

  # ── IoTDB ────────────────────────────────────────────────────────────────────
  iotdb:
    image: apache/iotdb:1.3.0-standalone
    container_name: iotdb
    restart: unless-stopped
    ports:
      - "6667:6667"   # client (CLI / JDBC / Python SDK)
      - "8080:8080"   # REST API (used by Grafana plugin)
    environment:
      - enable_rest_service=true
    volumes:
      - iotdb-data:/iotdb/data
      - iotdb-logs:/iotdb/logs

  # ── Flink JobManager ─────────────────────────────────────────────────────────
  flink-jobmanager:
    build:
      context: ./flink
      dockerfile: Dockerfile
    container_name: flink-jobmanager
    restart: unless-stopped
    command: jobmanager
    ports:
      - "8081:8081"   # Flink Web UI
      - "6123:6123"   # RPC
    environment:
      <<: [*kafka-env, *iotdb-env]
      FLINK_PROPERTIES: |
        jobmanager.rpc.address: flink-jobmanager
        rest.bind-address: 0.0.0.0
    depends_on:
      - kafka
      - iotdb
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8081/overview"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 30s

  # ── Flink TaskManager ────────────────────────────────────────────────────────
  flink-taskmanager:
    build:
      context: ./flink
      dockerfile: Dockerfile
    restart: unless-stopped
    command: taskmanager
    deploy:
      replicas: 2
    environment:
      <<: [*kafka-env, *iotdb-env]
      FLINK_PROPERTIES: |
        jobmanager.rpc.address: flink-jobmanager
        taskmanager.numberOfTaskSlots: 4
        taskmanager.memory.process.size: 1024m
    depends_on:
      flink-jobmanager:
        condition: service_healthy

  # ── Flink Job Submitter ──────────────────────────────────────────────────────
  # Submits the Python job once the JobManager is ready, then exits.
  flink-job:
    build:
      context: ./flink
      dockerfile: Dockerfile
    container_name: flink-job
    restart: on-failure
    command: >
      bash -c "echo 'Waiting for Flink JobManager...' && sleep 20 && flink run -m flink-jobmanager:8081 -py /opt/flink/usrlib/pipeline_job.py"
    environment:
      <<: [*kafka-env, *iotdb-env]
      FLINK_PROPERTIES: |
        jobmanager.rpc.address: flink-jobmanager
    depends_on:
      - flink-jobmanager
      - iotdb

  # ── Machine Simulator ────────────────────────────────────────────────────────
  simulator:
    build:
      context: ./simulators
      dockerfile: Dockerfile
    restart: unless-stopped
    deploy:
      replicas: 10          # 10 replicas × 10 machines = 100 machines total
      resources:
        limits:
          cpus: "0.25"
          memory: 128M
    environment:
      <<: *kafka-env
      NUM_MACHINES: "10"    # machines per replica
      SEND_INTERVAL_SEC: "2"
      MACHINE_PREFIX: "MC"
    depends_on:
      kafka:
        condition: service_healthy

  # ── Grafana ──────────────────────────────────────────────────────────────────
  grafana:
    build:
      context: ./grafana
      dockerfile: Dockerfile
    container_name: grafana
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_AUTH_ANONYMOUS_ENABLED: "false"
    volumes:
      - grafana-data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning
    depends_on:
      - iotdb
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/api/health"]
      interval: 15s
      timeout: 10s
      retries: 5

# ─── Volumes ──────────────────────────────────────────────────────────────────
volumes:
  zookeeper-data:
  zookeeper-logs:
  kafka-data:
  iotdb-data:
  iotdb-logs:
  grafana-data:

# ─── Network ──────────────────────────────────────────────────────────────────
networks:
  default:
    name: data-pipeline-net
    driver: bridge
