---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: grafana-storage
  namespace: data-pipeline
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 2Gi
---
apiVersion: v1
kind: Secret
metadata:
  name: grafana-secret
  namespace: data-pipeline
type: Opaque
stringData:
  admin-user: admin
  admin-password: admin   # Change before production!
---
# ============================================================
# Grafana datasource provisioning ConfigMap
#
# FIX: The provisioning file previously lived only on disk and
# was never surfaced into the K8s pod.  This ConfigMap carries
# the datasource YAML so the pod auto-provisions IoTDB on boot
# without any manual UI steps.
#
# FIX: Corrected the IoTDB REST port from 18080 → 8080.
# ============================================================
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-provisioning
  namespace: data-pipeline
data:
  iotdb.yml: |
    apiVersion: 1

    datasources:
      - name: IoTDB
        type: apache-iotdb-datasource
        access: proxy
        url: http://iotdb:8080
        isDefault: true
        jsonData:
          username: root
        secureJsonData:
          password: root
---
# ============================================================
# Grafana Deployment
#
# FIX 1: GF_INSTALL_PLUGINS corrected from
#         "alexanderzobnin-zabbix-app" → "apache-iotdb-datasource"
#         (the Zabbix plugin was completely wrong and would make
#         the datasource setup screen show no IoTDB option)
#
# FIX 2: grafana-provisioning ConfigMap mounted at
#         /etc/grafana/provisioning/datasources so IoTDB is
#         configured automatically on every fresh deploy.
# ============================================================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: grafana
  namespace: data-pipeline
  labels:
    app: grafana
spec:
  replicas: 1
  selector:
    matchLabels:
      app: grafana
  template:
    metadata:
      labels:
        app: grafana
    spec:
      containers:
        - name: grafana
          image: grafana/grafana:10.2.2
          ports:
            - containerPort: 3000
              name: http
          env:
            - name: GF_SECURITY_ADMIN_USER
              valueFrom:
                secretKeyRef:
                  name: grafana-secret
                  key: admin-user
            - name: GF_SECURITY_ADMIN_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: grafana-secret
                  key: admin-password
            - name: GF_USERS_ALLOW_SIGN_UP
              value: "false"
            # FIX: was "alexanderzobnin-zabbix-app"
            - name: GF_INSTALL_PLUGINS
              value: "apache-iotdb-datasource"
          volumeMounts:
            - name: grafana-storage
              mountPath: /var/lib/grafana
            # FIX: mount provisioning ConfigMap so datasource
            # is auto-configured on every pod start
            - name: grafana-provisioning
              mountPath: /etc/grafana/provisioning/datasources
              readOnly: true
          readinessProbe:
            httpGet:
              path: /api/health
              port: 3000
            initialDelaySeconds: 15
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 5
          livenessProbe:
            httpGet:
              path: /api/health
              port: 3000
            initialDelaySeconds: 30
            periodSeconds: 15
            timeoutSeconds: 5
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
      volumes:
        - name: grafana-storage
          persistentVolumeClaim:
            claimName: grafana-storage
        - name: grafana-provisioning
          configMap:
            name: grafana-provisioning
---
apiVersion: v1
kind: Service
metadata:
  name: grafana
  namespace: data-pipeline
  labels:
    app: grafana
spec:
  type: NodePort
  selector:
    app: grafana
  ports:
    - name: http
      port: 3000
      targetPort: 3000
      nodePort: 30300
