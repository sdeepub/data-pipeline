apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: iotdb-data
  namespace: data-pipeline
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 5Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: iotdb
  namespace: data-pipeline
  labels:
    app: iotdb
spec:
  replicas: 1
  selector:
    matchLabels:
      app: iotdb
  template:
    metadata:
      labels:
        app: iotdb
    spec:
      containers:
        - name: iotdb
          image: apache/iotdb:latest
          ports:
            - containerPort: 6667
              name: thrift
            - containerPort: 31999
              name: jmx
            - containerPort: 8080
              name: rest
          env:
            - name: cn_system_dir
              value: /iotdb/data/system
            - name: cn_data_dirs
              value: /iotdb/data/data
            - name: cn_wal_dir
              value: /iotdb/data/wal
            - name: cn_consensus_dir
              value: /iotdb/data/consensus
          volumeMounts:
            - name: iotdb-data
              mountPath: /iotdb/data
          readinessProbe:
            httpGet:
              path: /api/v1/ping
              port: 8080
            initialDelaySeconds: 20
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 5
          livenessProbe:
            httpGet:
              path: /api/v1/ping
              port: 8080
            initialDelaySeconds: 60
            periodSeconds: 20
            timeoutSeconds: 5
          resources:
            requests:
              cpu: "250m"
              memory: "512Mi"
            limits:
              cpu: "1000m"
              memory: "2Gi"
      volumes:
        - name: iotdb-data
          persistentVolumeClaim:
            claimName: iotdb-data
---
apiVersion: v1
kind: Service
metadata:
  name: iotdb
  namespace: data-pipeline
  labels:
    app: iotdb
spec:
  selector:
    app: iotdb
  ports:
    - name: thrift
      port: 6667
      targetPort: 6667
    - name: rest
      port: 8080
      targetPort: 8080
    - name: jmx
      port: 31999
      targetPort: 31999
---
apiVersion: v1
kind: Service
metadata:
  name: iotdb-external
  namespace: data-pipeline
spec:
  type: NodePort
  selector:
    app: iotdb
  ports:
    - name: thrift
      port: 6667
      targetPort: 6667
      nodePort: 30667
