---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: iotdb-data
  namespace: data-pipeline
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 5Gi
---
# ============================================================
# Apache IoTDB
#
# FIX 1: Pinned to 1.3.0-standalone (matches docker-compose).
#         `latest` is unpredictable and was pulling a cluster
#         image that requires separate ConfigNode/DataNode setup.
#
# FIX 2: Replaced cn_* env vars (ConfigNode-only) with the
#         correct standalone env var:
#           enable_rest_service=true
#         This activates the REST API on port 8080, which is
#         required by the Grafana IoTDB datasource plugin.
#
# FIX 3: Readiness probe kept on port 8080 (/api/v1/ping)
#         which is now guaranteed to start.
# ============================================================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: iotdb
  namespace: data-pipeline
  labels:
    app: iotdb
spec:
  replicas: 1
  selector:
    matchLabels:
      app: iotdb
  template:
    metadata:
      labels:
        app: iotdb
    spec:
      containers:
        - name: iotdb
          image: apache/iotdb:1.3.0-standalone
          ports:
            - containerPort: 6667
              name: thrift
            - containerPort: 31999
              name: jmx
            - containerPort: 8080
              name: rest
          env:
            # Enable the REST API (required for Grafana plugin)
            - name: enable_rest_service
              value: "true"
            # Data directory — valid for standalone image
            - name: dn_data_dirs
              value: /iotdb/data/data
            - name: dn_system_dir
              value: /iotdb/data/system
            - name: dn_wal_dirs
              value: /iotdb/data/wal
          volumeMounts:
            - name: iotdb-data
              mountPath: /iotdb/data
          readinessProbe:
            httpGet:
              path: /api/v1/ping
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 6
          livenessProbe:
            httpGet:
              path: /api/v1/ping
              port: 8080
            initialDelaySeconds: 90
            periodSeconds: 20
            timeoutSeconds: 5
          resources:
            requests:
              cpu: "250m"
              memory: "512Mi"
            limits:
              cpu: "1000m"
              memory: "2Gi"
      volumes:
        - name: iotdb-data
          persistentVolumeClaim:
            claimName: iotdb-data
---
apiVersion: v1
kind: Service
metadata:
  name: iotdb
  namespace: data-pipeline
  labels:
    app: iotdb
spec:
  selector:
    app: iotdb
  ports:
    - name: thrift
      port: 6667
      targetPort: 6667
    - name: rest
      port: 8080
      targetPort: 8080
    - name: jmx
      port: 31999
      targetPort: 31999
---
apiVersion: v1
kind: Service
metadata:
  name: iotdb-external
  namespace: data-pipeline
spec:
  type: NodePort
  selector:
    app: iotdb
  ports:
    - name: thrift
      port: 6667
      targetPort: 6667
      nodePort: 30667
