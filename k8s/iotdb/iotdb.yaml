---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: iotdb-data
  namespace: data-pipeline
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 5Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: iotdb
  namespace: data-pipeline
  labels:
    app: iotdb
spec:
  replicas: 1
  selector:
    matchLabels:
      app: iotdb
  template:
    metadata:
      labels:
        app: iotdb
    spec:
      containers:
        - name: iotdb
          image: apache/iotdb:1.3.0-standalone
          ports:
            - containerPort: 6667
              name: thrift
            - containerPort: 18080
              name: rest
          env:
            - name: enable_rest_service
              value: "true"
            - name: dn_data_dirs
              value: /iotdb/data/data
            - name: dn_system_dir
              value: /iotdb/data/system
            - name: dn_wal_dirs
              value: /iotdb/data/wal
          volumeMounts:
            - name: iotdb-data
              mountPath: /iotdb/data
          # Probe on Thrift port 6667 — always available when IoTDB is up.
          # REST API on 18080 takes longer to bind and has no /ping in 1.3.0.
          readinessProbe:
            exec:
              command: ["bash", "-c", "cat < /dev/null > /dev/tcp/localhost/6667"]
            initialDelaySeconds: 60
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 10
          # No liveness probe — IoTDB startup is slow and variable;
          # an aggressive liveness probe causes unnecessary restarts.
          resources:
            requests:
              cpu: "250m"
              memory: "512Mi"
            limits:
              cpu: "1000m"
              memory: "2Gi"
      volumes:
        - name: iotdb-data
          persistentVolumeClaim:
            claimName: iotdb-data
---
apiVersion: v1
kind: Service
metadata:
  name: iotdb
  namespace: data-pipeline
  labels:
    app: iotdb
spec:
  selector:
    app: iotdb
  ports:
    - name: thrift
      port: 6667
      targetPort: 6667
    - name: rest
      port: 18080
      targetPort: 18080
---
apiVersion: v1
kind: Service
metadata:
  name: iotdb-external
  namespace: data-pipeline
spec:
  type: NodePort
  selector:
    app: iotdb
  ports:
    - name: thrift
      port: 6667
      targetPort: 6667
      nodePort: 30667
