---
# ============================================================
# Flink ConfigMap — shared properties for all components
# ============================================================
apiVersion: v1
kind: ConfigMap
metadata:
  name: flink-config
  namespace: data-pipeline
data:
  flink-conf.yaml: |
    jobmanager.rpc.address: flink-jobmanager
    jobmanager.rpc.port: 6123
    jobmanager.memory.process.size: 1600m
    taskmanager.memory.process.size: 1728m
    taskmanager.numberOfTaskSlots: 4
    parallelism.default: 2
    rest.port: 8081
    rest.address: 0.0.0.0
    state.checkpoints.dir: file:///flink-checkpoints
    execution.checkpointing.interval: 60000
    execution.checkpointing.mode: EXACTLY_ONCE
---
# ============================================================
# PersistentVolumeClaim for Flink checkpoints
# (replaces ephemeral /tmp — survives pod restarts)
# ============================================================
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: flink-checkpoints
  namespace: data-pipeline
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 2Gi
---
# ============================================================
# Flink JobManager
# FIX 1: Uses custom image (flink-pipeline:latest) built from
#         flink/Dockerfile — includes PyFlink, IoTDB SDK,
#         Kafka connector JARs, and pipeline_job.py
# FIX 2: ConfigMap mounted at /opt/flink/conf/flink-conf.yaml
# FIX 3: Checkpoint PVC mounted at /flink-checkpoints
# ============================================================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: flink-jobmanager
  namespace: data-pipeline
  labels:
    app: flink
    component: jobmanager
spec:
  replicas: 1
  selector:
    matchLabels:
      app: flink
      component: jobmanager
  template:
    metadata:
      labels:
        app: flink
        component: jobmanager
    spec:
      containers:
        - name: flink-jobmanager
          # Build locally and load into Minikube:
          #   docker build -t flink-pipeline:latest ./flink
          #   minikube image load flink-pipeline:latest
          image: flink-pipeline:latest
          imagePullPolicy: Never
          command: ["/docker-entrypoint.sh"]
          args: ["jobmanager"]
          ports:
            - containerPort: 8081
              name: rest
            - containerPort: 6123
              name: rpc
          env:
            - name: JOB_MANAGER_RPC_ADDRESS
              value: flink-jobmanager
            # FLINK_PROPERTIES is the env-var entrypoint reads at startup;
            # the ConfigMap volume below provides the full config file.
            - name: FLINK_PROPERTIES
              valueFrom:
                configMapKeyRef:
                  name: flink-config
                  key: flink-conf.yaml
          volumeMounts:
            - name: flink-config-volume
              mountPath: /opt/flink/conf/flink-conf.yaml
              subPath: flink-conf.yaml
              readOnly: true
            - name: flink-checkpoints
              mountPath: /flink-checkpoints
          readinessProbe:
            httpGet:
              path: /v1/overview
              port: 8081
            initialDelaySeconds: 20
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 5
          livenessProbe:
            httpGet:
              path: /v1/overview
              port: 8081
            initialDelaySeconds: 60
            periodSeconds: 15
            timeoutSeconds: 5
          resources:
            requests:
              cpu: "250m"
              memory: "1Gi"
            limits:
              cpu: "1000m"
              memory: "2Gi"
      volumes:
        - name: flink-config-volume
          configMap:
            name: flink-config
        - name: flink-checkpoints
          persistentVolumeClaim:
            claimName: flink-checkpoints
---
apiVersion: v1
kind: Service
metadata:
  name: flink-jobmanager
  namespace: data-pipeline
  labels:
    app: flink
    component: jobmanager
spec:
  selector:
    app: flink
    component: jobmanager
  ports:
    - name: rpc
      port: 6123
      targetPort: 6123
    - name: rest
      port: 8081
      targetPort: 8081
---
apiVersion: v1
kind: Service
metadata:
  name: flink-jobmanager-rest
  namespace: data-pipeline
spec:
  type: NodePort
  selector:
    app: flink
    component: jobmanager
  ports:
    - name: rest
      port: 8081
      targetPort: 8081
      nodePort: 30081
---
# ============================================================
# Flink TaskManagers (2 replicas)
# FIX 1: Uses custom image (flink-pipeline:latest)
# FIX 2: ConfigMap mounted
# FIX 3: Checkpoint PVC shared with JobManager (ReadWriteOnce
#         works for single-node Minikube; use ReadWriteMany
#         with an NFS-backed StorageClass in multi-node clusters)
# ============================================================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: flink-taskmanager
  namespace: data-pipeline
  labels:
    app: flink
    component: taskmanager
spec:
  replicas: 2
  selector:
    matchLabels:
      app: flink
      component: taskmanager
  template:
    metadata:
      labels:
        app: flink
        component: taskmanager
    spec:
      containers:
        - name: flink-taskmanager
          image: flink-pipeline:latest
          imagePullPolicy: Never
          command: ["/docker-entrypoint.sh"]
          args: ["taskmanager"]
          env:
            - name: JOB_MANAGER_RPC_ADDRESS
              value: flink-jobmanager
            - name: TASK_MANAGER_NUMBER_OF_TASK_SLOTS
              value: "4"
            - name: FLINK_PROPERTIES
              valueFrom:
                configMapKeyRef:
                  name: flink-config
                  key: flink-conf.yaml
            # Pipeline env vars — passed through to pipeline_job.py
            - name: KAFKA_BOOTSTRAP_SERVERS
              value: "kafka:29092"
            - name: KAFKA_TOPIC
              value: "sensor-topic"
            - name: KAFKA_DEAD_LETTER_TOPIC
              value: "sensor-topic-dlq"
            - name: KAFKA_GROUP_ID
              value: "flink-pipeline"
            - name: IOTDB_HOST
              value: "iotdb"
            - name: IOTDB_PORT
              value: "6667"
            - name: IOTDB_USER
              value: "root"
            - name: IOTDB_PASSWORD
              value: "root"
            - name: IOTDB_STORAGE_GROUP
              value: "root.factory1"
            - name: CHECKPOINT_DIR
              value: "/flink-checkpoints"
          volumeMounts:
            - name: flink-config-volume
              mountPath: /opt/flink/conf/flink-conf.yaml
              subPath: flink-conf.yaml
              readOnly: true
            - name: flink-checkpoints
              mountPath: /flink-checkpoints
          resources:
            requests:
              cpu: "250m"
              memory: "1Gi"
            limits:
              cpu: "1000m"
              memory: "2Gi"
      volumes:
        - name: flink-config-volume
          configMap:
            name: flink-config
        - name: flink-checkpoints
          persistentVolumeClaim:
            claimName: flink-checkpoints
