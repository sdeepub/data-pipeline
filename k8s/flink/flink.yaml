---
# ============================================================
# Flink ConfigMap — shared properties for all components
# ============================================================
apiVersion: v1
kind: ConfigMap
metadata:
  name: flink-config
  namespace: data-pipeline
data:
  flink-conf.yaml: |
    jobmanager.rpc.address: flink-jobmanager
    jobmanager.rpc.port: 6123
    jobmanager.memory.process.size: 1600m
    taskmanager.memory.process.size: 1728m
    taskmanager.numberOfTaskSlots: 4
    parallelism.default: 2
    rest.port: 8081
    rest.address: 0.0.0.0
---
# ============================================================
# Flink JobManager
# ============================================================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: flink-jobmanager
  namespace: data-pipeline
  labels:
    app: flink
    component: jobmanager
spec:
  replicas: 1
  selector:
    matchLabels:
      app: flink
      component: jobmanager
  template:
    metadata:
      labels:
        app: flink
        component: jobmanager
    spec:
      containers:
        - name: flink-jobmanager
          image: flink:1.17-scala_2.12-java11
          command: ["/docker-entrypoint.sh"]
          args: ["jobmanager"]
          ports:
            - containerPort: 8081
              name: rest
            - containerPort: 6123
              name: rpc
          env:
            - name: JOB_MANAGER_RPC_ADDRESS
              value: flink-jobmanager
            - name: FLINK_PROPERTIES
              value: "jobmanager.rpc.address:flink-jobmanager\n"
          readinessProbe:
            httpGet:
              path: /v1/overview
              port: 8081
            initialDelaySeconds: 20
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 5
          livenessProbe:
            httpGet:
              path: /v1/overview
              port: 8081
            initialDelaySeconds: 60
            periodSeconds: 15
            timeoutSeconds: 5
          resources:
            requests:
              cpu: "250m"
              memory: "1Gi"
            limits:
              cpu: "1000m"
              memory: "2Gi"
---
apiVersion: v1
kind: Service
metadata:
  name: flink-jobmanager
  namespace: data-pipeline
  labels:
    app: flink
    component: jobmanager
spec:
  selector:
    app: flink
    component: jobmanager
  ports:
    - name: rpc
      port: 6123
      targetPort: 6123
    - name: rest
      port: 8081
      targetPort: 8081
---
apiVersion: v1
kind: Service
metadata:
  name: flink-jobmanager-rest
  namespace: data-pipeline
spec:
  type: NodePort
  selector:
    app: flink
    component: jobmanager
  ports:
    - name: rest
      port: 8081
      targetPort: 8081
      nodePort: 30081
---
# ============================================================
# Flink TaskManagers (2 replicas, matching docker-compose)
# ============================================================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: flink-taskmanager
  namespace: data-pipeline
  labels:
    app: flink
    component: taskmanager
spec:
  replicas: 2
  selector:
    matchLabels:
      app: flink
      component: taskmanager
  template:
    metadata:
      labels:
        app: flink
        component: taskmanager
    spec:
      containers:
        - name: flink-taskmanager
          image: flink:1.17-scala_2.12-java11
          command: ["/docker-entrypoint.sh"]
          args: ["taskmanager"]
          env:
            - name: JOB_MANAGER_RPC_ADDRESS
              value: flink-jobmanager
            - name: TASK_MANAGER_NUMBER_OF_TASK_SLOTS
              value: "4"
            - name: FLINK_PROPERTIES
              value: "jobmanager.rpc.address:flink-jobmanager\n"
          resources:
            requests:
              cpu: "250m"
              memory: "1Gi"
            limits:
              cpu: "1000m"
              memory: "2Gi"
